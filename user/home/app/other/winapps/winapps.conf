##################################
#   WINAPPS CONFIGURATION FILE   #
##################################

# Whitespace and empty lines are ignored; anything after '#' is a comment.

# [WINDOWS USERNAME]
RDP_USER="stefan"

# [WINDOWS PASSWORD]
# Required when using FreeRDP v3.9.0 or greater.
RDP_PASS="password"

# [WINDOWS DOMAIN]
# Default: '' (blank).
RDP_DOMAIN=""

# [WINDOWS IPV4 ADDRESS]
# With 'libvirt', determined at runtime if left blank.
RDP_IP=""

# [VM NAME]
# Only used with 'libvirt'; must match the VM so WinApps can find/start it.
VM_NAME="win11-office"

# [WINAPPS BACKEND]
# One of: 'docker', 'podman', 'libvirt', 'manual'. Default: 'docker'.
WAFLAVOR="libvirt"

# [DISPLAY SCALING FACTOR]
# Valid: '100', '140', '180'; unsupported values snap to the closest. Default: '100'.
RDP_SCALE="100"

# [MOUNTING REMOVABLE PATHS FOR FILES]
# Mount point for removable devices; udisks defaults to /run/media (FHS prefers /media).
# REFERENCE: https://wiki.archlinux.org/title/Udisks#Mount_to_/media
REMOVABLE_MEDIA="/run/media"

# [ADDITIONAL FREERDP FLAGS & ARGUMENTS]
# Extra FreeRDP flags; /network:lan can boost performance but breaks for some users.
RDP_FLAGS="/cert:tofu /sound /microphone +home-drive /dynamic-resolution /wm-class:WinApps +clipboard +window-drag"

# [DEBUG WINAPPS]
# 'true' appends to ~/.local/share/winapps/winapps.log. Default: 'true'.
DEBUG="true"

# [AUTOMATICALLY PAUSE WINDOWS]
# 'on'/'off'; incompatible with the 'manual' backend. Default: 'off'.
AUTOPAUSE="off"

# [AUTOMATICALLY PAUSE WINDOWS TIMEOUT]
# Inactivity seconds before pausing Windows (nearest 10s, min 20). Ignored if AUTOPAUSE is off.
AUTOPAUSE_TIME="300"

# [FREERDP COMMAND]
# Command to run FreeRDPv3 (e.g. 'xfreerdp', 'xfreerdp3'); auto-detected if blank.
FREERDP_COMMAND="xfreerdp"

# [TIMEOUTS]
# Only raise these if the corresponding error occurs, after the troubleshooting tips.

# PORT CHECK
# Max seconds to check the RDP port is open; error "NETWORK CONFIGURATION ERROR" (13).
PORT_TIMEOUT="5"

# RDP CONNECTION TEST
# Max seconds for the initial RDP connection; error "REMOTE DESKTOP PROTOCOL FAILURE" (14).
RDP_TIMEOUT="30"

# APPLICATION SCAN
# Max seconds for the installed-application scan; error "APPLICATION QUERY FAILURE" (15).
APP_SCAN_TIMEOUT="60"

# WINDOWS BOOT
# Max seconds to wait for the VM to boot before launching an application.
BOOT_TIMEOUT="120"
